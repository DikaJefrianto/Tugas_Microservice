version: '3.7'

services:
  db:
    image: mariadb:10.6
    container_name: wordpress_db
    restart: always
    environment:
      # Ubah nilai di bawah ini dengan kata sandi dan nama DB yang kuat/sesuai
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: root
      MYSQL_PASSWORD: 12345678
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wordpress_app
    restart: always
    ports:
      - "8080:80"  # Akses WordPress di http://localhost:8080
    environment:
      # Pastikan nilai di bawah ini SAMA dengan yang diatur di bagian 'db'
      WORDPRESS_DB_HOST: db:3306  # Gunakan nama service 'db' sebagai host
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: 12345678
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - wp_data:/var/www/html

volumes:
  db_data:
  wp_data: